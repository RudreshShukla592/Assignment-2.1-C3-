<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-2.1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

<body>

            <div class="logo">
                <img src="./assets/logo.png" alt="">

                <h3>Home</h3>

                </div>
            </div>
            <div class="card">
                 <div class="card-img"><img src="./assets/img3.png" alt=""></div>
                <div class="card-des">
                    <div class="div-btn">
                        <button class="card-btn">Marketing</button>
                    </div>
                    <div class="des">
                       <p>How Data-Driven <br> Strategies Are Important</p>
                    </div>

                </div>
